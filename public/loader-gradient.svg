<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient-loader" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#60A5FA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loader-gradient {
      animation: rotate 2s linear infinite;
      transform-origin: 50% 50%;
    }
  </style>
  <g class="loader-gradient">
    <circle cx="50" cy="50" r="35" fill="none" stroke="url(#gradient-loader)" stroke-width="6" stroke-linecap="round" stroke-dasharray="55 220"/>
  </g>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#E5E7EB" stroke-width="6" opacity="0.2"/>
</svg>
