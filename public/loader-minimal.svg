<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinner-circle {
      animation: spin 1.5s linear infinite;
      transform-origin: 50% 50%;
    }
  </style>
  <g class="spinner-circle">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#9CA3AF" stroke-width="4" opacity="0.2"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#3B82F6" stroke-width="4" stroke-dasharray="62.8 250.6" stroke-linecap="round"/>
  </g>
</svg>
